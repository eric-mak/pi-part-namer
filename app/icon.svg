<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#ece7d8"/>

  <!-- hex head of a socket-head screw sitting above left leg of pi -->
  <polygon points="14,4 28,4 32,11 28,18 14,18 10,11"
           fill="#faf7ef" stroke="#0a0a0a" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="21" cy="11" r="3" fill="#0a0a0a"/>

  <!-- pi crossbar -->
  <rect x="6" y="20" width="52" height="5" fill="#0a0a0a"/>

  <!-- left leg as threaded screw shaft -->
  <rect x="15" y="25" width="10" height="30" fill="#faf7ef" stroke="#0a0a0a" stroke-width="2"/>
  <g stroke="#0a0a0a" stroke-width="1.4" stroke-linecap="round">
    <line x1="15" y1="29" x2="25" y2="31"/>
    <line x1="15" y1="33" x2="25" y2="35"/>
    <line x1="15" y1="37" x2="25" y2="39"/>
    <line x1="15" y1="41" x2="25" y2="43"/>
    <line x1="15" y1="45" x2="25" y2="47"/>
    <line x1="15" y1="49" x2="25" y2="51"/>
  </g>
  <!-- pointed tip on left leg -->
  <polygon points="15,55 25,55 20,61" fill="#0a0a0a"/>

  <!-- right leg — solid serif pi stroke with foot -->
  <rect x="41" y="25" width="8" height="30" fill="#0a0a0a"/>
  <polygon points="38,54 52,54 49,58 41,58" fill="#0a0a0a"/>
</svg>
